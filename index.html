<!DOCTYPE html>
<html>
  <head>
    <title>AR Campus Explorer - Prodi TI UMY</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #ui-overlay {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-family: Arial, sans-serif;
        text-align: center;
        z-index: 1000;
        width: 80%;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-overlay">
      <h2 style="margin: 0; font-size: 18px;">AR Campus Explorer</h2>
      <p id="info-text" style="font-size: 14px;">Arahkan kamera ke Marker di depan pintu Lab</p>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      
      <a-marker preset="hiro">
        
        <a-plane position="0 0.5 0" rotation="-90 0 0" width="2" height="1.2" color="#212529" opacity="0.9">
          <a-text value="LABORATORIUM TERPADU" align="center" position="0 0.3 0.1" width="3" color="#FFD700"></a-text>
          
          <a-text value="Status: Sedang Digunakan" align="center" position="0 0 0.1" width="2.5"></a-text>
          <a-text value="Matkul: Praktikum Jaringan" align="center" position="0 -0.2 0.1" width="2" color="#00FF00"></a-text>
        </a-plane>

        <a-entity 
          gltf-model="url(https://raw.githack.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/scene.gltf)"
          scale="0.05 0.05 0.05"
          position="0 1 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Logika sederhana untuk mengganti teks jika marker terdeteksi
      const marker = document.querySelector('a-marker');
      const infoText = document.getElementById('info-text');

      marker.addEventListener('markerFound', () => {
        infoText.innerText = "Informasi Ruangan Berhasil Dimuat!";
        infoText.style.color = "#00FF00";
      });

      marker.addEventListener('markerLost', () => {
        infoText.innerText = "Arahkan kamera ke Marker di depan pintu Lab";
        infoText.style.color = "white";
      });
    </script>
  </body>
</html>
