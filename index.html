<!DOCTYPE html>
<html>
  <head>
    <title>Cek Jadwal TI UMY</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      #ui-overlay {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.95); color: white; padding: 15px;
        border-radius: 15px; font-family: sans-serif; z-index: 1000; width: 92%;
        border: 2px solid #FFD700; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      }
      h2 { margin: 0; font-size: 14px; color: #FFD700; text-align: center; }
      input {
        width: 100%; padding: 11px; margin-top: 10px; border-radius: 8px;
        border: 2px solid #444; background: #222; color: white; font-size: 14px;
      }
      #day-selector { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
      .day-btn {
        flex: 1; min-width: 44px; padding: 7px 2px; border-radius: 8px;
        border: 2px solid #444; background: #222; color: #aaa;
        font-size: 11px; cursor: pointer; text-align: center; transition: all 0.2s;
      }
      .day-btn.active { border-color: #FFD700; background: #FFD700; color: #111; font-weight: bold; }
      .day-btn.today-marker { border-color: #888; color: #fff; }
      #search-result {
        margin-top: 10px; font-size: 13px; max-height: 260px;
        overflow-y: auto; color: #00FF00;
      }
      .jadwal-item {
        background: rgba(255,255,255,0.08); padding: 10px; margin-bottom: 8px;
        border-radius: 8px; border-left: 4px solid #FFD700;
      }
      .nav-btn {
        margin-top: 8px; width: 100%; padding: 8px; border-radius: 6px;
        background: #FFD700; color: #111; font-weight: bold; font-size: 13px;
        border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      }
      .nav-btn:active { background: #e6c200; }
      #nav-panel {
        display: none; position: fixed; bottom: 0; left: 0; right: 0;
        background: rgba(0,0,0,0.97); border-top: 2px solid #FFD700;
        padding: 16px; z-index: 2000; border-radius: 16px 16px 0 0;
        font-family: sans-serif; color: white;
      }
      #nav-panel h3 { margin: 0 0 6px 0; color: #FFD700; font-size: 15px; }
      #nav-panel .lantai-badge {
        display: inline-block; background: #FFD700; color: #111;
        font-weight: bold; padding: 3px 10px; border-radius: 20px; font-size: 13px; margin-bottom: 10px;
      }
      #nav-panel .nav-info { font-size: 13px; color: #ccc; margin-bottom: 12px; line-height: 1.6; }
      .nav-close {
        width: 100%; padding: 10px; border-radius: 8px; background: #333;
        color: #fff; border: 1px solid #555; font-size: 14px; cursor: pointer; margin-top: 4px;
      }
      #ar-status {
        font-size: 11px; color: #FFD700; text-align: center;
        margin-top: 6px; display: none;
      }
      #status-db { font-size: 10px; color: #666; margin-top: 5px; display: block; }
      #debug-info { font-size: 10px; color: #444; margin-top: 2px; display: block; word-break: break-all; }
    </style>
  </head>

  <body style="margin:0; overflow:hidden;">

    <!-- UI Panel -->
    <div id="ui-overlay">
      <h2>🎓 CARI JADWAL DOSEN TI UMY</h2>
      <input type="text" id="dosen-input" placeholder="Ketik nama dosen (misal: Nasyan)..." oninput="searchDosen()">
      <div id="day-selector"></div>
      <div id="search-result">Menghubungkan ke Google Sheets...</div>
      <span id="status-db">Status: Memuat...</span>
      <span id="debug-info"></span>
      <div id="ar-status">📍 GPS aktif — Arahkan kamera ke sekitar gedung</div>
    </div>

    <!-- Navigasi Panel (muncul saat tap navigasi) -->
    <div id="nav-panel">
      <h3 id="nav-title">Navigasi ke Ruangan</h3>
      <div id="nav-lantai" class="lantai-badge"></div>
      <div id="nav-info" class="nav-info"></div>
      <button class="nav-btn" onclick="startAR()">📷 Aktifkan AR Navigator</button>
      <button class="nav-close" onclick="closeNav()">✕ Tutup</button>
    </div>

    <!-- AR Scene -->
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.85;">
      <a-entity id="ar-markers"></a-entity>
      <a-entity camera gps-camera rotation-reader></a-entity>
    </a-scene>

    <script>
      // ── Data Ruangan ──────────────────────────────────────────────────
      const lokasiRuang = {
        "F4.001": { lat: -7.80929638, lng: 110.32205151, lantai: "Dasar",   gedung: "F4" },
        "F4.002": { lat: -7.80925054, lng: 110.32208102, lantai: "Dasar",   gedung: "F4" },
        "F4.003": { lat: -7.80921201, lng: 110.32210381, lantai: "Dasar",   gedung: "F4" },
        "F6.001": { lat: -7.80889114, lng: 110.32207565, lantai: "Dasar",   gedung: "F6" },
        "F6.002": { lat: -7.80904061, lng: 110.32206291, lantai: "Dasar",   gedung: "F6" },
        "F6.003": { lat: -7.80901337, lng: 110.32197507, lantai: "Dasar",   gedung: "F6" },
        "F6.004": { lat: -7.80898547, lng: 110.32194489, lantai: "Dasar",   gedung: "F6" },
        "F6.101": { lat: -7.80888294, lng: 110.32199937, lantai: "Lantai 1", gedung: "F6" },
        "F6.102": { lat: -7.80888892, lng: 110.32205435, lantai: "Lantai 1", gedung: "F6" },
        "F6.103": { lat: -7.80890619, lng: 110.32209794, lantai: "Lantai 1", gedung: "F6" },
        "F6.202": { lat: -7.80905168, lng: 110.32205167, lantai: "Lantai 2", gedung: "F6" },
        "F6.203": { lat: -7.80902245, lng: 110.32199266, lantai: "Lantai 2", gedung: "F6" },
        "F6.204": { lat: -7.80899521, lng: 110.32194773, lantai: "Lantai 2", gedung: "F6" },
      };

      // Petunjuk naik lantai
      const petunjukLantai = {
        "Dasar":    "Ruangan berada di lantai dasar (Dasar). Tidak perlu naik tangga.",
        "Lantai 1": "Naik ke Lantai 1 — gunakan tangga atau lift di lobi utama gedung.",
        "Lantai 2": "Naik ke Lantai 2 — gunakan tangga atau lift di lobi utama gedung.",
      };

      // ── Setup Hari ────────────────────────────────────────────────────
      const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTayPnRtpp9N4qw7y73V7KS0xEY1kXtlDAGMCm4_IqzVWH_QYS-uVCZQRRZ62M3bQ/pub?output=csv";
      let jadwalData = [];
      let activeRuang = null;

      const hariList  = ["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
      const dayNames  = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
      const todayName = dayNames[new Date().getDay()];
      let selectedHari = hariList.includes(todayName) ? todayName : "Senin";

      function buildDayButtons() {
        const container = document.getElementById('day-selector');
        hariList.forEach(hari => {
          const btn = document.createElement('button');
          const isToday  = hari === todayName;
          const isActive = hari === selectedHari;
          btn.className = 'day-btn' + (isToday ? ' today-marker' : '') + (isActive ? ' active' : '');
          btn.textContent = isToday ? hari + ' ★' : hari;
          btn.onclick = () => {
            selectedHari = hari;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            searchDosen();
          };
          container.appendChild(btn);
        });
      }
      buildDayButtons();

      // ── Load Data ─────────────────────────────────────────────────────
      Papa.parse(sheetUrl + "&cache=" + Date.now(), {
        download: true, header: true, skipEmptyLines: true,
        complete(results) {
          jadwalData = results.data;
          const cols = results.meta.fields || [];
          document.getElementById('search-result').innerText = "Data siap. Silakan ketik nama dosen.";
          document.getElementById('status-db').innerText = `Database: ${jadwalData.length} baris | Hari ini: ${todayName}`;
          document.getElementById('debug-info').innerText = "Kolom: " + cols.join(" | ");
        },
        error(err) {
          document.getElementById('search-result').innerText = "❌ Gagal memuat data.";
          document.getElementById('status-db').innerText = "ERROR: " + err.message;
        }
      });

      // ── Search ────────────────────────────────────────────────────────
      function searchDosen() {
        const input     = document.getElementById('dosen-input').value.toLowerCase().trim();
        const resultDiv = document.getElementById('search-result');
        const hariLower = selectedHari.toLowerCase();

        if (input.length < 3) { resultDiv.innerHTML = "Ketik minimal 3 huruf nama dosen..."; return; }

        const matches = jadwalData.filter(row => {
          const nama = (row["Dosen"] || "").toLowerCase().trim();
          const hari = (row["Hari"]  || "").toLowerCase().trim();
          return nama.includes(input) && hari === hariLower;
        });

        if (matches.length > 0) {
          const isToday = selectedHari === todayName;
          let html = `<b style="color:#FFD700">Jadwal ${isToday ? 'Hari Ini ' : ''}(${selectedHari}):</b><br><br>`;
          matches.forEach(m => {
            const ruang   = (m["Ruang"] || "").trim();
            const lokasi  = lokasiRuang[ruang];
            const hasNav  = !!lokasi;
            html += `<div class="jadwal-item">
              <b>📍 Ruang: ${ruang}</b>
              ${hasNav ? `<span style="color:#FFD700;font-size:11px"> — ${lokasi.gedung} ${lokasi.lantai}</span>` : ''}
              <br>🕐 Jam: ${m["Jam"] || '?'}<br>
              📚 ${m["MATA KULIAH"] || '?'}<br>
              <small>Kelas: ${m["Kelas"] || '-'}</small><br>
              ${hasNav
                ? `<button class="nav-btn" onclick="showNav('${ruang}')">🧭 Navigasi ke ${ruang}</button>`
                : `<small style="color:#888">Navigasi tidak tersedia untuk ruangan ini</small>`
              }
            </div>`;
          });
          resultDiv.innerHTML = html;
        } else {
          const allHari = [...new Set(
            jadwalData
              .filter(r => (r["Dosen"]||"").toLowerCase().trim().includes(input))
              .map(r => (r["Hari"]||"").trim()).filter(Boolean)
          )];
          resultDiv.innerHTML = allHari.length > 0
            ? `Tidak ada jadwal "<b>${input}</b>" hari <b>${selectedHari}</b>.<br><small style="color:#aaa">Tersedia di: ${allHari.join(', ')}</small>`
            : `Nama "<b>${input}</b>" tidak ditemukan di database.`;
        }
      }

      // ── Navigasi Panel ────────────────────────────────────────────────
      function showNav(ruang) {
        const lok = lokasiRuang[ruang];
        if (!lok) return;
        activeRuang = ruang;

        document.getElementById('nav-title').textContent  = `Navigasi ke ${ruang}`;
        document.getElementById('nav-lantai').textContent = `${lok.gedung} — ${lok.lantai}`;
        document.getElementById('nav-info').innerHTML =
          `<b>Gedung:</b> ${lok.gedung}<br>
           <b>Lantai:</b> ${lok.lantai}<br>
           <b>Koordinat:</b> ${lok.lat.toFixed(6)}, ${lok.lng.toFixed(6)}<br><br>
           🪜 ${petunjukLantai[lok.lantai] || ''}`;

        document.getElementById('nav-panel').style.display = 'block';
      }

      function closeNav() {
        document.getElementById('nav-panel').style.display = 'none';
        clearARMarkers();
        document.getElementById('ar-status').style.display = 'none';
      }

      // ── AR Navigator ──────────────────────────────────────────────────
      function startAR() {
        if (!activeRuang) return;
        const lok = lokasiRuang[activeRuang];

        // Minta izin GPS
        if (!navigator.geolocation) {
          alert("GPS tidak didukung di browser ini.");
          return;
        }

        navigator.geolocation.getCurrentPosition(
          pos => {
            clearARMarkers();
            placeARMarker(activeRuang, lok);
            document.getElementById('nav-panel').style.display = 'none';
            document.getElementById('ar-status').style.display = 'block';
            document.getElementById('ar-status').textContent =
              `📍 AR aktif → ${activeRuang} (${lok.lantai}) | Arahkan kamera ke gedung ${lok.gedung}`;
          },
          err => {
            alert("Izin GPS diperlukan untuk AR Navigator.\nAktifkan lokasi di browser kamu.");
          },
          { enableHighAccuracy: true }
        );
      }

      function placeARMarker(ruang, lok) {
        const markersEl = document.getElementById('ar-markers');

        // Entity panah + label di koordinat GPS ruangan
        const entity = document.createElement('a-entity');
        entity.setAttribute('gps-entity-place', `latitude: ${lok.lat}; longitude: ${lok.lng}`);
        entity.setAttribute('look-at', '[gps-camera]');

        // Label ruangan
        const label = document.createElement('a-text');
        label.setAttribute('value', `⬆ ${ruang}\n${lok.gedung} · ${lok.lantai}`);
        label.setAttribute('align', 'center');
        label.setAttribute('color', '#FFD700');
        label.setAttribute('width', '12');
        label.setAttribute('position', '0 1.5 0');

        // Panah
        const cone = document.createElement('a-cone');
        cone.setAttribute('color', '#FFD700');
        cone.setAttribute('radius-bottom', '0.3');
        cone.setAttribute('radius-top', '0');
        cone.setAttribute('height', '0.8');
        cone.setAttribute('position', '0 0.5 0');
        cone.setAttribute('rotation', '0 0 180');

        // Lingkaran base
        const circle = document.createElement('a-cylinder');
        circle.setAttribute('color', '#1a1a1a');
        circle.setAttribute('radius', '0.5');
        circle.setAttribute('height', '0.05');
        circle.setAttribute('position', '0 0 0');

        entity.appendChild(label);
        entity.appendChild(cone);
        entity.appendChild(circle);
        markersEl.appendChild(entity);
      }

      function clearARMarkers() {
        const el = document.getElementById('ar-markers');
        while (el.firstChild) el.removeChild(el.firstChild);
      }
    </script>
  </body>
</html>
