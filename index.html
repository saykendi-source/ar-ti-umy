<!DOCTYPE html>
<html>
  <head>
    <title>Cek Jadwal TI UMY</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
      #ui-overlay {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.95); color: white; padding: 15px;
        border-radius: 15px; font-family: sans-serif; z-index: 1000; width: 85%;
        border: 2px solid #FFD700;
      }
      input {
        width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px;
        border: 2px solid #444; background: #222; color: white; font-size: 14px; box-sizing: border-box;
      }
      #search-result {
        margin-top: 10px; font-size: 12px; text-align: left; 
        max-height: 250px; overflow-y: auto; color: #00FF00;
      }
      .jadwal-item {
        background: rgba(255,255,255,0.1); padding: 8px; margin-bottom: 5px; border-radius: 5px;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-overlay">
      <h2 style="margin: 0; font-size: 14px; color: #FFD700; text-align: center;">CEK JADWAL DOSEN HARI INI</h2>
      <input type="text" id="dosen-input" placeholder="Ketik nama (contoh: haris)..." oninput="searchDosen()">
      <div id="search-result">Silakan ketik nama dosen...</div>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      <a-marker preset="hiro" id="marker-handler">
        <a-plane position="0 0.6 0" rotation="-90 0 0" width="2.8" height="2" color="#1a1a1a">
          <a-text id="ar-status-text" value="Scan Marker" align="center" position="0 0.2 0.1" width="3"></a-text>
        </a-plane>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ32Z9treiKtgIqpMnBjsYCwcMw88HYiA4r3mmonJQmeFB8jV1L0uIFKzlHcryqsg/pub?output=csv";
      let jadwalData = [];

      // Fungsi untuk membersihkan nama kolom (menghapus spasi/karakter aneh)
      const cleanKey = (obj) => {
        const newObj = {};
        Object.keys(obj).forEach(key => {
          newObj[key.trim().toUpperCase()] = obj[key];
        });
        return newObj;
      };

      Papa.parse(sheetUrl + "&cb=" + Date.now(), {
        download: true,
        header: true,
        complete: function(results) {
          // Bersihkan header agar selalu uppercase dan tanpa spasi
          jadwalData = results.data.map(row => cleanKey(row));
          console.log("Data Terdeteksi:", jadwalData);
        }
      });

      function searchDosen() {
        const input = document.getElementById('dosen-input').value.toLowerCase().trim();
        const resultDiv = document.getElementById('search-result');
        
        const now = new Date();
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const today = days[now.getDay()];

        if (input.length < 3) {
          resultDiv.innerHTML = "Ketik minimal 3 huruf...";
          return;
        }

        // Filter jadwal berdasarkan HARI INI dan NAMA DOSEN
        const matches = jadwalData.filter(row => {
          const dosen = (row["DOSEN"] || "").toLowerCase();
          const hari = (row["HARI"] || "").trim();
          return dosen.includes(input) && hari === today;
        });

        if (matches.length > 0) {
          let html = `<b style="color:#FFD700">Jadwal ${today}:</b><br>`;
          matches.forEach(m => {
            html += `<div class="jadwal-item">
                      <b>${m.MULAI} - ${m.SELESAI}</b><br>
                      Ruang: ${m.RUANG}<br>
                      Matkul: ${m["MATA KULIAH"] || m["MATAKULIAH"]}
                    </div>`;
          });
          resultDiv.innerHTML = html;
        } else {
          resultDiv.innerHTML = `Tidak ada jadwal untuk "${input}" hari ini (${today}).`;
        }
      }
    </script>
  </body>
</html>
