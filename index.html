<!DOCTYPE html>
<html>
  <head>
    <title>Cek Jadwal TI UMY</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
      #ui-overlay {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.95); color: white; padding: 15px;
        border-radius: 15px; font-family: sans-serif; z-index: 1000; width: 90%;
        border: 2px solid #FFD700; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      }
      input {
        width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px;
        border: 2px solid #444; background: #222; color: white; font-size: 14px; box-sizing: border-box;
      }
      #day-selector {
        display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
      }
      .day-btn {
        flex: 1; min-width: 48px; padding: 7px 4px; border-radius: 8px;
        border: 2px solid #444; background: #222; color: #aaa;
        font-size: 12px; cursor: pointer; text-align: center;
        transition: all 0.2s;
      }
      .day-btn.active {
        border-color: #FFD700; background: #FFD700; color: #111; font-weight: bold;
      }
      .day-btn.today-marker {
        border-color: #888; color: #fff;
      }
      #search-result {
        margin-top: 10px; font-size: 13px; text-align: left;
        max-height: 280px; overflow-y: auto; color: #00FF00;
      }
      .jadwal-item {
        background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 8px;
        border-radius: 5px; border-left: 4px solid #FFD700;
      }
      #status-db { font-size: 10px; color: #888; margin-top: 5px; display: block; }
      #debug-info { font-size: 10px; color: #555; margin-top: 4px; display: block; word-break: break-all; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-overlay">
      <h2 style="margin: 0; font-size: 14px; color: #FFD700; text-align: center;">CARI JADWAL DOSEN TI UMY</h2>

      <input type="text" id="dosen-input" placeholder="Ketik nama dosen (misal: Nasyan)..." oninput="searchDosen()">

      <!-- Pilihan Hari -->
      <div id="day-selector"></div>

      <div id="search-result">Menghubungkan ke Google Sheets...</div>
      <span id="status-db">Status: Memuat...</span>
      <span id="debug-info"></span>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      <a-marker preset="hiro">
        <a-plane position="0 0.6 0" rotation="-90 0 0" width="2.8" height="1" color="#1a1a1a">
          <a-text value="Gunakan Input di Atas" align="center" position="0 0 0.1" width="3" color="#FFD700"></a-text>
        </a-plane>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTayPnRtpp9N4qw7y73V7KS0xEY1kXtlDAGMCm4_IqzVWH_QYS-uVCZQRRZ62M3bQ/pub?output=csv";
      let jadwalData = [];

      const hariList = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
      const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
      const todayName = dayNames[new Date().getDay()];

      // Default: hari ini, atau Senin kalau hari ini Minggu
      let selectedHari = hariList.includes(todayName) ? todayName : "Senin";

      // Buat tombol hari
      function buildDayButtons() {
        const container = document.getElementById('day-selector');
        hariList.forEach(hari => {
          const btn = document.createElement('button');
          const isToday = hari === todayName;
          const isActive = hari === selectedHari;
          btn.className = 'day-btn' + (isToday ? ' today-marker' : '') + (isActive ? ' active' : '');
          btn.textContent = isToday ? hari + ' ★' : hari;
          btn.dataset.hari = hari;
          btn.onclick = () => {
            selectedHari = hari;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            searchDosen();
          };
          container.appendChild(btn);
        });
      }

      buildDayButtons();

      Papa.parse(sheetUrl + "&cache=" + Date.now(), {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          jadwalData = results.data;
          const cols = results.meta.fields || [];
          document.getElementById('search-result').innerText = "Data siap. Silakan ketik nama dosen.";
          document.getElementById('status-db').innerText = "Database: " + jadwalData.length + " baris | Hari ini: " + todayName;
          document.getElementById('debug-info').innerText = "Kolom: " + cols.join(" | ");
        },
        error: function(err) {
          document.getElementById('search-result').innerText = "❌ Gagal memuat data. Pastikan Google Sheets sudah di-publish ke web.";
          document.getElementById('status-db').innerText = "Status: ERROR — " + err.message;
        }
      });

      function searchDosen() {
        const input = document.getElementById('dosen-input').value.toLowerCase().trim();
        const resultDiv = document.getElementById('search-result');
        const hariLower = selectedHari.toLowerCase();

        if (input.length < 3) {
          resultDiv.innerHTML = "Ketik minimal 3 huruf nama dosen...";
          return;
        }

        const matches = jadwalData.filter(row => {
          const namaDosen = (row["Dosen"] || "").toLowerCase().trim();
          const hariJadwal = (row["Hari"] || "").toLowerCase().trim();
          return namaDosen.includes(input) && hariJadwal === hariLower;
        });

        if (matches.length > 0) {
          const isToday = selectedHari === todayName;
          let html = `<b style="color:#FFD700">Jadwal ${isToday ? 'Hari Ini ' : ''}(${selectedHari}):</b><br><br>`;
          matches.forEach(m => {
            html += `<div class="jadwal-item">
                      <b>Ruang: ${m["Ruang"] || '?'}</b><br>
                      Jam: ${m["Jam"] || '?'}<br>
                      Matkul: ${m["MATA KULIAH"] || '?'}<br>
                      <small>Kelas: ${m["Kelas"] || '-'}</small>
                    </div>`;
          });
          resultDiv.innerHTML = html;
        } else {
          // Tampilkan hari lain yang ada jadwalnya sebagai info tambahan
          const allHari = jadwalData
            .filter(r => (r["Dosen"] || "").toLowerCase().trim().includes(input))
            .map(r => (r["Hari"] || "").trim())
            .filter(Boolean);
          const uniqueHari = [...new Set(allHari)];

          if (uniqueHari.length > 0) {
            resultDiv.innerHTML = `Tidak ada jadwal "<b>${input}</b>" pada hari <b>${selectedHari}</b>.<br>
              <small style="color:#aaa">Tersedia di: ${uniqueHari.join(', ')}</small>`;
          } else {
            resultDiv.innerHTML = `Nama "<b>${input}</b>" tidak ditemukan di database.`;
          }
        }
      }
    </script>
  </body>
</html>
