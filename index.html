<!DOCTYPE html>
<html>
<head>
  <title>Cek Jadwal TI UMY</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    /* ── Dasar ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; font-family: sans-serif; overflow: hidden; }

    #camera-view {
      display: none; position: fixed; inset: 0; z-index: 0;
    }
    #camera-view video { width: 100%; height: 100%; object-fit: cover; }

    /* ── AR Overlay & Panah Baru ── */
    #ar-overlay {
      display: none; position: fixed; inset: 0; z-index: 100; pointer-events: none;
    }
    
    #ar-arrow-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      /* Menyesuaikan titik tengah agar rotasi panah sempurna */
      transform: translate(-50%, -60%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      pointer-events: none;
    }

    #ar-arrow {
      /* Bayangan Glow agar panah terlihat 'menyala' di atas kamera */
      filter: drop-shadow(0 0 16px rgba(255,215,0,0.95));
      /* Animasi halus saat panah berputar */
      transition: transform 0.25s ease;
    }

    #ar-label {
      background: rgba(0,0,0,0.8); color: #FFD700;
      padding: 8px 18px; border-radius: 12px; font-size: 15px;
      font-weight: bold; border: 1.5px solid #FFD700; text-align: center; line-height: 1.6;
    }

    #ar-info-bar {
      position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
      width: 88%; background: rgba(0,0,0,0.8); border: 1px solid #FFD700;
      border-radius: 12px; padding: 10px 14px; color: white;
      font-size: 13px; text-align: center; line-height: 1.8;
    }

    #ar-compass-bar {
      position: absolute; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75); padding: 10px;
      color: #aaa; font-size: 12px; text-align: center;
    }

    #btn-stop-ar {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 30px; border-radius: 20px; background: rgba(220,50,50,0.9);
      color: white; font-size: 14px; font-weight: bold; border: none;
      cursor: pointer; pointer-events: all;
    }

    /* ── UI Jadwal & Panel (Sama seperti sebelumnya) ── */
    #ui-overlay {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.95); color: white; padding: 15px;
      border-radius: 15px; z-index: 500; width: 92%;
      border: 2px solid #FFD700; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    input { width: 100%; padding: 11px; margin-top: 10px; border-radius: 8px; border: 2px solid #444; background: #222; color: white; }
    #day-selector { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
    .day-btn { flex: 1; min-width: 44px; padding: 7px 2px; border-radius: 8px; border: 2px solid #444; background: #222; color: #aaa; font-size: 11px; cursor: pointer; }
    .day-btn.active { border-color: #FFD700; background: #FFD700; color: #111; font-weight: bold; }
    #search-result { margin-top: 10px; font-size: 13px; max-height: 300px; overflow-y: auto; color: #00FF00; }
    .jadwal-item { background: rgba(255,255,255,0.07); padding: 10px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid #FFD700; }
    .nav-btn { margin-top: 8px; width: 100%; padding: 9px; border-radius: 6px; background: #FFD700; color: #111; font-weight: bold; border: none; cursor: pointer; }
    
    #nav-panel {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.97); border-top: 2px solid #FFD700;
      padding: 16px; z-index: 600; border-radius: 16px 16px 0 0; color: white;
    }

    /* iOS Compass Popup */
    #ios-compass-popup { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
    #ios-compass-popup.show { display: flex; }
    .ios-popup-box { background: #1a1a1a; border: 2px solid #FFD700; border-radius: 16px; padding: 24px 20px; width: 88%; text-align: center; color: white; }
    #btn-allow-compass { width: 100%; padding: 13px; border-radius: 10px; background: #FFD700; color: #111; font-weight: bold; border: none; }
  </style>
</head>
<body>

  <div id="camera-view"><video id="cam-video" autoplay playsinline muted></video></div>

  <div id="ar-overlay">
    <div id="ar-compass-bar">
      🧭 Heading: <span id="txt-heading">--</span>° &nbsp;|&nbsp;
      Arah: <span id="txt-bearing">--</span>° &nbsp;|&nbsp;
      Jarak: <span id="txt-dist">--</span>
    </div>
    
    <div id="ar-arrow-wrap">
      <svg id="ar-arrow" width="100" height="120" viewBox="0 0 100 120">
        <path d="M50 5 L95 55 L65 55 L65 115 L35 115 L35 55 L5 55 Z" fill="#FFD700" stroke="#000" stroke-width="2" />
      </svg>
      <div id="ar-label">Menunggu GPS...</div>
    </div>

    <div id="ar-info-bar">--</div>
    <button id="btn-stop-ar" onclick="stopAR()">✕ Matikan AR</button>
  </div>

  <div id="ui-overlay">
    <h2>🎓 JADWAL TI UMY - AR NAVIGATOR</h2>
    <input type="text" id="dosen-input" placeholder="Cari nama dosen..." oninput="searchDosen()">
    <div id="day-selector"></div>
    <div id="search-result">Memuat database...</div>
    <span id="status-db" style="font-size: 10px; color: #555;">Status: Memuat...</span>
  </div>

  <div id="nav-panel">
    <h3 id="nav-title">Navigasi</h3>
    <div id="nav-lantai" style="background:#FFD700; color:#111; padding:3px 10px; border-radius:20px; display:inline-block; font-size:12px; margin-bottom:10px;"></div>
    <div id="nav-info" style="font-size:13px; color:#ccc; margin-bottom:15px;"></div>
    <button style="width:100%; padding:12px; background:#FFD700; color:#111; font-weight:bold; border:none; border-radius:8px; margin-bottom:10px;" onclick="startAR()">📷 Aktifkan AR Navigator</button>
    <button style="width:100%; padding:10px; background:#333; color:#fff; border:none; border-radius:8px;" onclick="closeNav()">✕ Tutup</button>
  </div>

  <div id="ios-compass-popup">
    <div class="ios-popup-box">
      <h3>🧭 Izin Kompas</h3>
      <p>Izin diperlukan agar panah navigasi bisa menunjukkan arah yang benar.</p>
      <button id="btn-allow-compass" onclick="grantCompassIOS()">Izinkan</button>
    </div>
  </div>

<script>
// (Seluruh logika JavaScript tetap sama seperti kode awal Anda)
// Pastikan lokasiRuang, petunjukLantai, dan fungsi navigasi tetap ada di bawah sini.

const lokasiRuang = {
  "F4.001": { lat:-7.80929638, lng:110.32205151, lantai:"Dasar", gedung:"F4" },
  "F4.002": { lat:-7.80925054, lng:110.32208102, lantai:"Dasar", gedung:"F4" },
  "F4.003": { lat:-7.80921201, lng:110.32210381, lantai:"Dasar", gedung:"F4" },
  "F6.001": { lat:-7.80889114, lng:110.32207565, lantai:"Dasar", gedung:"F6" },
  "F6.002": { lat:-7.80904061, lng:110.32206291, lantai:"Dasar", gedung:"F6" },
  "F6.101": { lat:-7.80888294, lng:110.32199937, lantai:"Lantai 1", gedung:"F6" },
  "F6.202": { lat:-7.80905168, lng:110.32205167, lantai:"Lantai 2", gedung:"F6" }
};
const petunjukLantai = {
  "Dasar": "Ruangan di lantai dasar.",
  "Lantai 1": "Naik ke Lantai 1 via tangga lobi.",
  "Lantai 2": "Naik ke Lantai 2 via tangga lobi."
};

const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTayPnRtpp9N4qw7y73V7KS0xEY1kXtlDAGMCm4_IqzVWH_QYS-uVCZQRRZ62M3bQ/pub?output=csv";
let jadwalData = [], activeRuang = null, userLat = null, userLng = null, userHeading = null, gpsWatcher = null, arLoop = null;

const hariList = ["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const todayName = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"][new Date().getDay()];
let selectedHari = hariList.includes(todayName) ? todayName : "Senin";

function buildDayButtons() {
  const c = document.getElementById('day-selector');
  hariList.forEach(hari => {
    const btn = document.createElement('button');
    btn.className = 'day-btn'+(hari===todayName?' today-marker':'')+(hari===selectedHari?' active':'');
    btn.textContent = hari;
    btn.onclick = () => {
      selectedHari = hari;
      document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      searchDosen();
    };
    c.appendChild(btn);
  });
}
buildDayButtons();

Papa.parse(sheetUrl + "&cache=" + Date.now(), {
  download:true, header:true, skipEmptyLines:true,
  complete(r) { 
    jadwalData = r.data; 
    document.getElementById('search-result').innerText = "Database siap.";
    document.getElementById('status-db').innerText = `✅ ${jadwalData.length} baris dimuat.`;
  }
});

function searchDosen() {
  const input = document.getElementById('dosen-input').value.toLowerCase().trim();
  const el = document.getElementById('search-result');
  if (input.length < 3) return;
  const hl = selectedHari.toLowerCase();
  const matches = jadwalData.filter(r => 
    (r["Dosen"]||"").toLowerCase().includes(input) && 
    (r["Hari"]||"").toLowerCase().trim() === hl
  );
  if (matches.length > 0) {
    let html = `<b>Jadwal ${selectedHari}:</b><br><br>`;
    matches.forEach(m => {
      const r = (m["Ruang"]||"").trim();
      const lok = lokasiRuang[r];
      html += `<div class="jadwal-item">
        <b>📍 ${r}</b> ${lok ? `<small>(${lok.lantai})</small>` : ''}<br>
        🕐 ${m["Jam"]||'?'}<br>
        ${lok ? `<button class="nav-btn" onclick="showNav('${r}')">🧭 Navigasi</button>` : ''}
      </div>`;
    });
    el.innerHTML = html;
  } else { el.innerHTML = "Tidak ada jadwal."; }
}

function showNav(ruang) {
  activeRuang = ruang;
  const lok = lokasiRuang[ruang];
  document.getElementById('nav-title').textContent = `Menuju ${ruang}`;
  document.getElementById('nav-lantai').textContent = `${lok.gedung} - ${lok.lantai}`;
  document.getElementById('nav-info').innerText = petunjukLantai[lok.lantai];
  document.getElementById('nav-panel').style.display = 'block';
}

function closeNav() { document.getElementById('nav-panel').style.display = 'none'; }

async function startAR() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('cam-video').srcObject = stream;
    document.getElementById('camera-view').style.display = 'block';
    document.getElementById('ar-overlay').style.display = 'block';
    document.getElementById('ui-overlay').style.display = 'none';
    closeNav();
    
    gpsWatcher = navigator.geolocation.watchPosition(p => {
      userLat = p.coords.latitude; userLng = p.coords.longitude;
    }, null, { enableHighAccuracy: true });

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS && typeof DeviceOrientationEvent.requestPermission === 'function') {
      document.getElementById('ios-compass-popup').classList.add('show');
    } else {
      window.addEventListener('deviceorientationabsolute', handleOri, true);
      window.addEventListener('deviceorientation', handleOri, true);
    }
    
    arLoop = setInterval(() => {
      if (userLat && activeRuang) {
        const lok = lokasiRuang[activeRuang];
        updateArrow(lok);
      }
    }, 200);
  } catch (e) { alert("Error: " + e); }
}

async function grantCompassIOS() {
  const res = await DeviceOrientationEvent.requestPermission();
  if (res === 'granted') {
    window.addEventListener('deviceorientation', handleOri, true);
    document.getElementById('ios-compass-popup').classList.remove('show');
  }
}

function handleOri(e) {
  userHeading = e.webkitCompassHeading || (360 - e.alpha);
}

function updateArrow(lok) {
  const bearing = calcBearing(userLat, userLng, lok.lat, lok.lng);
  const dist = calcDist(userLat, userLng, lok.lat, lok.lng);
  const rot = (bearing - (userHeading || 0) + 360) % 360;
  
  document.getElementById('ar-arrow').style.transform = `rotate(${rot}deg)`;
  document.getElementById('ar-label').innerText = `${activeRuang} (${Math.round(dist)}m)`;
  document.getElementById('txt-heading').innerText = Math.round(userHeading || 0);
  document.getElementById('txt-bearing').innerText = Math.round(bearing);
  document.getElementById('txt-dist').innerText = Math.round(dist) + "m";
}

function calcBearing(lat1, lon1, lat2, lon2) {
  const r = Math.PI/180;
  const y = Math.sin((lon2-lon1)*r) * Math.cos(lat2*r);
  const x = Math.cos(lat1*r)*Math.sin(lat2*r) - Math.sin(lat1*r)*Math.cos(lat2*r)*Math.cos((lon2-lon1)*r);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function calcDist(lat1, lon1, lat2, lon2) {
  const R = 6371000, r = Math.PI/180;
  const dLat = (lat2-lat1)*r, dLon = (lon2-lon1)*r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function stopAR() {
  location.reload(); // Paling aman untuk reset kamera & GPS
}
</script>
</body>
</html>
