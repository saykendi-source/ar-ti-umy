<!DOCTYPE html>
<html>
  <head>
    <title>Cek Jadwal TI UMY</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
      #ui-overlay {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.95); color: white; padding: 15px;
        border-radius: 15px; font-family: sans-serif; z-index: 1000; width: 90%;
        border: 2px solid #FFD700; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      }
      input {
        width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px;
        border: 2px solid #444; background: #222; color: white; font-size: 14px; box-sizing: border-box;
      }
      #search-result {
        margin-top: 10px; font-size: 13px; text-align: left; 
        max-height: 300px; overflow-y: auto; color: #00FF00;
      }
      .jadwal-item {
        background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 8px; 
        border-radius: 5px; border-left: 4px solid #FFD700;
      }
      #status-db { font-size: 10px; color: #888; margin-top: 5px; display: block; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-overlay">
      <h2 style="margin: 0; font-size: 14px; color: #FFD700; text-align: center;">CARI DOSEN (HARI INI)</h2>
      <input type="text" id="dosen-input" placeholder="Ketik nama (misal: Nasyan)..." oninput="searchDosen()">
      <div id="search-result">Menghubungkan ke Google Sheets...</div>
      <span id="status-db">Status: Memuat...</span>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      <a-marker preset="hiro">
        <a-plane position="0 0.6 0" rotation="-90 0 0" width="2.8" height="1" color="#1a1a1a">
          <a-text value="Gunakan Input di Atas" align="center" position="0 0 0.1" width="3" color="#FFD700"></a-text>
        </a-plane>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ32Z9treiKtgIqpMnBjsYCwcMw88HYiA4r3mmonJQmeFB8jV1L0uIFKzlHcryqsg/pub?output=csv";
      let jadwalData = [];

      Papa.parse(sheetUrl + "&cache=" + Date.now(), {
        download: true,
        header: true,
        skipEmptyLines: true, // FIX 1: Lewati baris kosong agar tidak ada data null
        complete: function(results) {
          jadwalData = results.data;
          document.getElementById('search-result').innerText = "Data siap. Silakan ketik nama dosen.";
          document.getElementById('status-db').innerText = "Database: " + jadwalData.length + " baris dimuat.";
        },
        error: function(err) {
          // FIX 2: Tambahkan error handler agar kelihatan kalau CSV gagal dimuat
          document.getElementById('search-result').innerText = "Gagal memuat data: " + err.message;
          document.getElementById('status-db').innerText = "Status: ERROR";
        }
      });

      function searchDosen() {
        const input = document.getElementById('dosen-input').value.toLowerCase().trim();
        const resultDiv = document.getElementById('search-result');
        
        // Mengambil hari ini
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const today = days[new Date().getDay()];
        const todayLower = today.toLowerCase(); // untuk perbandingan

        if (input.length < 3) {
          resultDiv.innerHTML = "Ketik minimal 3 huruf nama dosen...";
          return;
        }

        // FIX 3: Gunakan kolom "Hari" dan "Jam" yang benar sesuai struktur Excel,
        //         bukan kolom "Waktu" yang tidak ada.
        //         Tambahkan .trim().toLowerCase() untuk mengatasi spasi & kapitalisasi tidak konsisten.
        const matches = jadwalData.filter(row => {
          const namaDosen = (row["Dosen"] || "").toLowerCase().trim();
          const hariJadwal = (row["Hari"] || "").toLowerCase().trim(); // ✅ Kolom yang benar
          
          return namaDosen.includes(input) && hariJadwal === todayLower;
        });

        if (matches.length > 0) {
          let html = `<b style="color:#FFD700">Jadwal Hari Ini (${today.toUpperCase()}):</b><br><br>`;
          matches.forEach(m => {
            html += `<div class="jadwal-item">
                      <b>Ruang: ${m["Ruang"] || '?'}</b><br>
                      Jam: ${m["Jam"] || '?'}<br>
                      Matkul: ${m["MATA KULIAH"] || '?'}<br>
                      <small>Kelas: ${m["Kelas"] || '-'}</small>
                    </div>`;
          });
          resultDiv.innerHTML = html;
        } else {
          resultDiv.innerHTML = `Tidak ditemukan jadwal untuk "<b>${input}</b>" pada hari <b>${today}</b>.`;
        }
      }
    </script>
  </body>
</html>
