<!DOCTYPE html>
<html>
  <head>
    <title>AR Campus Explorer - Realtime Jadwal</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
      #ui-overlay {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8); color: white; padding: 15px;
        border-radius: 15px; font-family: 'Segoe UI', sans-serif;
        text-align: center; z-index: 1000; width: 85%; border: 1px solid #FFD700;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-overlay">
      <h2 style="margin: 0; font-size: 16px; color: #FFD700;">PRODI TI UMY - AR GUIDE</h2>
      <p id="info-text" style="font-size: 13px; margin: 5px 0;">Memuat Jadwal...</p>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      <a-marker preset="hiro" id="marker-lab">
        <a-plane position="0 0.5 0" rotation="-90 0 0" width="2.5" height="1.5" color="#1a1a1a" opacity="0.9">
          <a-text id="ar-room-name" value="MENCARI RUANGAN..." align="center" position="0 0.4 0.1" width="3" color="#FFD700"></a-text>
          <a-text id="ar-status" value="Status: Checking..." align="center" position="0 0.1 0.1" width="2.5"></a-text>
          <a-text id="ar-matkul" value="-" align="center" position="0 -0.2 0.1" width="2.2" color="#00FF00"></a-text>
          <a-text id="ar-dosen" value="-" align="center" position="0 -0.4 0.1" width="1.8"></a-text>
        </a-plane>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      let jadwalData = [];
      const namaRuanganMarker = "Lab. Jaringan"; // Sesuaikan nama ini dengan yang ada di file CSV Anda

      // 1. Ambil data dari file CSV di GitHub
      Papa.parse("jadwal.csv", {
        download: true,
        header: true,
        complete: function(results) {
          jadwalData = results.data;
          console.log("Jadwal Loaded:", jadwalData);
          document.getElementById('info-text').innerText = "Siap! Scan Marker di depan Lab";
        }
      });

      function updateSchedule() {
        const now = new Date();
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const currentDay = days[now.getDay()];
        const currentTime = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');

        // Cari jadwal yang cocok dengan Ruangan, Hari, dan Waktu
        const match = jadwalData.find(j => 
          j.Ruang === namaRuanganMarker && 
          j.Hari === currentDay
          // Logika jam bisa ditambah lebih detail (misal: antara jam mulai & jam selesai)
        );

        if (match) {
          document.getElementById('ar-room-name').setAttribute('value', match.Ruang);
          document.getElementById('ar-status').setAttribute('value', "Status: SEDANG KULIAH");
          document.getElementById('ar-matkul').setAttribute('value', match["Mata Kuliah"]);
          document.getElementById('ar-dosen').setAttribute('value', match.Dosen);
          document.getElementById('info-text').innerText = "Jadwal Ditemukan!";
        } else {
          document.getElementById('ar-room-name').setAttribute('value', namaRuanganMarker);
          document.getElementById('ar-status').setAttribute('value', "Status: KOSONG / TIDAK ADA JADWAL");
          document.getElementById('ar-matkul').setAttribute('value', "-");
          document.getElementById('ar-dosen').setAttribute('value', "-");
        }
      }

      // Jalankan pengecekan saat marker ditemukan
      document.querySelector('#marker-lab').addEventListener('markerFound', updateSchedule);
    </script>
  </body>
</html>
