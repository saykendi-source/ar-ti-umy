<!DOCTYPE html>
<html>
  <head>
    <title>Cek Kehadiran Dosen - AR Prodi TI</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
      #ui-overlay {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9); color: white; padding: 15px;
        border-radius: 15px; font-family: sans-serif; z-index: 1000; width: 90%;
        border: 2px solid #FFD700; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      }
      input {
        width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px;
        border: none; font-size: 14px; box-sizing: border-box;
      }
      #search-result {
        margin-top: 10px; font-size: 12px; text-align: left; 
        max-height: 150px; overflow-y: auto; color: #00FF00;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="ui-overlay">
      <h2 style="margin: 0; font-size: 14px; color: #FFD700; text-align: center;">CARI JADWAL DOSEN HARI INI</h2>
      <input type="text" id="dosen-input" placeholder="Ketik nama dosen (contoh: Cahyo)..." oninput="searchDosen()">
      <div id="search-result">Hasil akan muncul di sini...</div>
    </div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      <a-marker preset="hiro">
        <a-plane position="0 0.6 0" rotation="-90 0 0" width="2.8" height="1.8" color="#1a1a1a" opacity="0.9">
          <a-text value="INFO DOSEN" align="center" position="0 0.6 0.1" width="3.5" color="#FFD700"></a-text>
          <a-text id="ar-info-dosen" value="Scan & Cari Dosen di Atas" align="center" position="0 0 0.1" width="2.5"></a-text>
        </a-plane>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ32Z9treiKtgIqpMnBjsYCwcMw88HYiA4r3mmonJQmeFB8jV1L0uIFKzlHcryqsg/pub?output=csv";
      let jadwalData = [];

      Papa.parse(sheetUrl, {
        download: true,
        header: true,
        complete: function(results) {
          jadwalData = results.data;
        }
      });

      function searchDosen() {
        const input = document.getElementById('dosen-input').value.toLowerCase();
        const resultDiv = document.getElementById('search-result');
        const arText = document.getElementById('ar-info-dosen');
        
        const now = new Date();
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const today = days[now.getDay()];

        if (input.length < 3) {
          resultDiv.innerHTML = "Ketik minimal 3 huruf...";
          return;
        }

        // Filter jadwal berdasarkan nama dosen dan HARI INI
        const matches = jadwalData.filter(row => 
          row.DOSEN && 
          row.DOSEN.toLowerCase().includes(input) && 
          row.HARI === today
        );

        if (matches.length > 0) {
          let html = `<b>Jadwal ${today}:</b><br>`;
          let arDisplay = `Dosen ditemukan di ${matches.length} kelas hari ini.`;
          
          matches.forEach(m => {
            html += `• ${m.MULAI}-${m.SELESAI} | Ruang: ${m.RUANG}<br>`;
          });
          
          resultDiv.innerHTML = html;
          arText.setAttribute('value', arDisplay);
        } else {
          resultDiv.innerHTML = `Dosen tidak ada jadwal mengajar hari ${today}.`;
          arText.setAttribute('value', `Tidak ada jadwal hari ${today}`);
        }
      }
    </script>
  </body>
</html>
